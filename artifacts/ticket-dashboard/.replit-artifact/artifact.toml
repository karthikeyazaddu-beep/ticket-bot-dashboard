kind = "web"
previewPath = "/"
title = "Ticket Bot Dashboard"
version = "1.0.0"
id = "artifacts/ticket-dashboard"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23569

[services.development]
run = "pnpm --filter @workspace/ticket-dashboard run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/ticket-dashboard", "run", "build" ]
publicDir = "artifacts/ticket-dashboard/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23569"
BASE_PATH = "/"
